version: '3.8'

services:
  wordfeud-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wordfeud-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - wordfeud-network

networks:
  wordfeud-network:
    driver: bridge
